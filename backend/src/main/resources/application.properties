# =============================================================================
# OpenSettlers — Configuration Quarkus
# =============================================================================

# --- PostgreSQL (Dev Services lance un container Docker automatiquement) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.db-name=opensettlers

# --- Hibernate ORM ---
# drop-and-create en dev, valider en prod
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# --- Game Engine ---
opensettlers.tick-rate=0.1s
opensettlers.production-time=5
opensettlers.max-players-per-room=4
opensettlers.map-width=64
opensettlers.map-height=64
opensettlers.soldier-move-ticks=3
opensettlers.attack-radius=50

# --- Worker Distances ---
opensettlers.worker.woodcutter.max-distance=4
opensettlers.worker.forester.max-distance=4
opensettlers.worker.quarryman.max-distance=4
opensettlers.worker.farmer.max-fields=3
opensettlers.worker.fisherman.max-distance=3

# --- WebSocket ---
quarkus.websockets-next.server.max-message-size=1048576

# --- CORS (frontend Nuxt en dev) ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# --- Logging ---
quarkus.log.category."fr.opensettlers".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# --- Military: garrison capacity ---
opensettlers.military.capacity.barracks=2
opensettlers.military.capacity.guardhouse=3
opensettlers.military.capacity.watchtower=6
opensettlers.military.capacity.castle=9
opensettlers.military.capacity.headquarters=1

# --- Military: territory radius (hex distance) ---
opensettlers.military.radius.barracks=4
opensettlers.military.radius.guardhouse=5
opensettlers.military.radius.watchtower=8
opensettlers.military.radius.castle=11
opensettlers.military.radius.headquarters=20
