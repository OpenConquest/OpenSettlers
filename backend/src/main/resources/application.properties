# =============================================================================
# OpenSettlers — Configuration Quarkus
# =============================================================================

# --- PostgreSQL (Dev Services lance un container Docker automatiquement) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.db-name=opensettlers

# --- Hibernate ORM ---
# drop-and-create en dev, valider en prod
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# --- Game Engine ---
# Le réglage du moteur (tick, distances, garnisons, catapultes, IA, naval, etc.)
# vit dans fr.opensettlers.utils.GameConfig sous forme de constantes.

# --- WebSocket ---
quarkus.websockets-next.server.max-message-size=1048576

# --- CORS (frontend Nuxt en dev) ---
# NB: en Quarkus 3.x la clé d'activation est `quarkus.http.cors.enabled`.
# On utilise /.*/ pour autoriser toutes les origines (localhost:3000, 127.0.0.1:3000, etc.)
quarkus.http.cors.enabled=true
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# --- Logging ---
quarkus.log.category."fr.opensettlers".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
